services:
  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - home_net
      - quiz_net
      - home_webserver_net
    restart: unless-stopped

  whoami:
    image: traefik/whoami:latest
    container_name: whoami
    networks:
      - home_net
    restart: unless-stopped
  
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - home_net
    restart: unless-stopped
  
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=myhouse.local,localhost
      - HOMEPAGE_VAR_PORTAINER_API_KEY=${HOMEPAGE_VAR_PORTAINER_API_KEY:-}
    networks:
      - home_net
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    ports:
      - "61208:61208"
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GLANCES_OPT=-w --bind 0.0.0.0
      - /:/host:ro
    networks:
      - home_net
    restart: unless-stopped

  myspeed:
    image: germannewsmaker/myspeed:latest
    container_name: myspeed
    ports:
      - "5216:5216"
    volumes:
      - myspeed_data:/myspeed/data
    networks:
      - home_net
    restart: unless-stopped

networks:
  home_net:
    name: home_net

  quiz_net:
    external: true
    name: quiz_webapp_default

  home_webserver_net:
    external: true
    name: home-webserver_default

volumes:
  caddy_data:
  caddy_config:
  portainer_data:
  myspeed_data:
